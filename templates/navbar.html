{% load static %}

<nav class="w-full flex justify-between items-center py-3 px-4 fixed z-50">

    <!-- LADO ESQUERDO: LOGO -->
    <div class="w-6/12">
        <a href="{% url 'filme:homepage' %}">
            <img class="w-2/12" src="{% static 'images/hashflix.png' %}" alt="Hashflix">
        </a>
    </div>

    <!-- LADO DIREITO: PESQUISA, BOTÕES -->
    <div class="w-6/12 flex flex-nowrap justify-end items-center">

        {% if user.is_authenticated %}
            <!-- BARRA DE PESQUISA -->
            <div class="mr-2">
                <form method="get" action="{% url 'filme:pesquisa' %}">
                    <input type="text" class="py-1 px-2 rounded-md text-white bg-gray-800 border border-gray-600" name="query" placeholder="Pesquisar...">
                </form>
            </div>

            <!-- BOTÃO DE LOGOUT (POST) -->
            <div class="mr-2">
                <form method="post" action="{% url 'filme:logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="bg-red-600 text-white py-1 px-3 rounded-md hover:bg-red-700">
                        Logout
                    </button>
                </form>
            </div>

            <!-- BOTÃO DE EDITAR PERFIL -->
            <div class="mr-2">
                <a href="{% url 'filme:edita_perfil' request.user.id %}">
                    <button class="bg-red-600 text-white py-1 px-3 rounded-md hover:bg-red-700">
                        Editar perfil
                    </button>
                </a>
            </div>
        {% else %}
            <!-- BOTÃO DE LOGIN -->
            <div class="mr-2">
                <a href="{% url 'filme:login' %}">
                    <button class="bg-red-600 text-white py-1 px-3 rounded-md hover:bg-red-700">
                        Login
                    </button>
                </a>
            </div>
        {% endif %}

    </div> <!-- Fechamento correto da div da direita -->

</nav>
