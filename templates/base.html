<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{% block titulo %} {% endblock %}</title>

    <!-- TAILWINDCSS E BOOTSTRAP -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

    {% block head %}
    {% endblock %}
</head>
<body class="bg-black text-white-100 font-primary">
    {% include 'navbar.html' %}

    {% block conteudo %}
    {% endblock %}

    <!-- IONICONS (ICONES PERSONALIZADOS) -->
    <script type="module" src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.js"></script>

    <!-- JS para tratar a barra de navegação do site (caso passe da altura da tela inicial, a barra de
    navegação fica invisivel, caso passse de 100px o scroll, mas não passe da altura da tela, fica com
    background cinza e caso não passe de 100px, remove o fundo e deixa visivel-->
    <script>
        const nav = document.querySelector('nav')

        document.addEventListener("scroll", e=>{
            if(scrollY>100) {
                if (scrollY > window.innerHeight) {
                    nav.classList.add('invisible')
                } else {
                    nav.classList.add('bg-gray-900')
                    nav.classList.remove('invisible')
                }
            }else{
                nav.classList.remove('bg-gray-900')
                nav.classList.remove('invisible')
            }
        })

    </script>
</body>
</html>
